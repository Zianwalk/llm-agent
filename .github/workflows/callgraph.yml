name: Generate Call Graph

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          pip install pyan3

      - name: Generate callgraph
        run: python scripts/generate_callgraph.py

      - name: Keep only latest output
        run: |
          LATEST=$(ls callgraphs/ | grep -v latest | sort | tail -1)
          for dir in callgraphs/*/; do
            dirname=$(basename "$dir")
            if [ "$dirname" != "latest" ] && [ "$dirname" != "$LATEST" ]; then
              rm -rf "$dir"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add callgraphs README.md
          git rm -r --cached --ignore-unmatch $(git ls-files --deleted callgraphs/)
          git commit -m "update callgraphs" || echo "no changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
