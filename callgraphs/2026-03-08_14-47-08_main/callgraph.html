<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Call Graph – 2026-03-08_14-47-08_main</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d1117; font-family:'Courier New',monospace; color:#c9d1d9; }
  #header {
    padding:16px 24px;
    border-bottom:1px solid #30363d;
    display:flex; align-items:center; gap:12px;
  }
  #header h1 { font-size:15px; color:#58a6ff; letter-spacing:.05em; }
  #header span { font-size:12px; color:#8b949e; }
  #graph { width:100%; height:calc(100vh - 53px); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/dist/vis-network.min.js"></script>
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/dist/dist/vis-network.min.css">
</head>
<body>
<div id="header">
  <h1>&#128336; Call Graph</h1>
  <span>main &nbsp;·&nbsp; 2026-03-08_14-47-08</span>
</div>
<div id="graph"></div>
<script>
const nodes = new vis.DataSet([{"id": "agent", "label": "agent", "title": "agent"}, {"id": "build_tool_prompt", "label": "build_tool_prompt", "title": "build_tool_prompt"}, {"id": "calculator", "label": "calculator", "title": "calculator"}, {"id": "llm", "label": "llm", "title": "llm"}, {"id": "load_model", "label": "load_model", "title": "load_model"}, {"id": "parse_calls", "label": "parse_calls", "title": "parse_calls"}, {"id": "parse_tool_call", "label": "parse_tool_call", "title": "parse_tool_call"}, {"id": "visit_Call", "label": "visit_Call", "title": "visit_Call"}, {"id": "visit_FunctionDef", "label": "visit_FunctionDef", "title": "visit_FunctionDef"}]);
const edges = new vis.DataSet([{"from": "agent", "to": "llm", "arrows": "to"}, {"from": "agent", "to": "parse_tool_call", "arrows": "to"}]);

const options = {
  physics: {
    solver: "forceAtlas2Based",
    forceAtlas2Based: { gravitationalConstant:-60, springLength:120 },
    stabilization: { iterations:200 }
  },
  nodes: {
    shape:"box", borderRadius:6,
    color:{ background:"#161b22", border:"#30363d", highlight:{ background:"#1f6feb", border:"#58a6ff" } },
    font:{ color:"#c9d1d9", face:"Courier New", size:13 },
    shadow:{ enabled:true, color:"rgba(0,0,0,0.5)", x:2, y:2, size:8 }
  },
  edges:{
    color:{ color:"#58a6ff", highlight:"#79c0ff" },
    smooth:{ type:"curvedCW", roundness:0.15 },
    arrows:{ to:{ enabled:true, scaleFactor:0.7 } }
  },
  interaction:{ hover:true, tooltipDelay:100, zoomView:true }
};

new vis.Network(
  document.getElementById("graph"),
  { nodes, edges },
  options
);
</script>
</body>
</html>
